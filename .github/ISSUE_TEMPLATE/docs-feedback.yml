name: Documentation feedback
description: Report onboarding, README, GitHub Pages, or documentation clarity issues.
title: "[Docs] "
labels:
  - needs-triage
  - kind:docs
body:
  - type: markdown
    attributes:
      value: |
        Use this form for README updates, GitHub Pages content, setup guidance, and onboarding issues.
  - type: textarea
    id: summary
    attributes:
      label: What documentation or onboarding change do you want?
      description: Point to the page, section, or flow that should improve.
      placeholder: Identify the documentation gap or page that needs work.
    validations:
      required: true
  - type: textarea
    id: gap
    attributes:
      label: What is the current gap?
      description: Explain what is unclear, missing, outdated, or hard to follow.
      placeholder: Describe the confusion or missing information.
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: What should the improved version say or include?
      description: Share the clarification, structure change, or missing content.
      placeholder: Describe the documentation update you want.
    validations:
      required: true
  - type: input
    id: context
    attributes:
      label: Optional context link or contact
      description: Add a reference URL, screenshot link, or GitHub handle if useful.
      placeholder: https://example.com or @github-handle
