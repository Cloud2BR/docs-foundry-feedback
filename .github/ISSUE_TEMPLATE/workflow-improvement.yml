name: Workflow improvement
description: Request improvements to an existing Docs Foundry workflow or user experience.
title: "[Improve] "
labels:
  - needs-triage
  - kind:improve
body:
  - type: markdown
    attributes:
      value: |
        Use this form when a current workflow exists but needs to be better, faster, clearer, or easier to use.
  - type: textarea
    id: current
    attributes:
      label: What should improve?
      description: Describe the existing behavior, surface, or workflow that needs work.
      placeholder: Explain the workflow that feels rough or inefficient today.
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: What is the current friction?
      description: Explain what is slowing you down, creating confusion, or causing unnecessary work.
      placeholder: Describe the pain point clearly.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: What should a better version look like?
      description: Describe the improved workflow, UI, or system behavior.
      placeholder: Explain the change you want to see.
    validations:
      required: true
  - type: input
    id: context
    attributes:
      label: Optional context link or contact
      description: Add a reference URL, screenshot link, or GitHub handle if useful.
      placeholder: https://example.com or @github-handle
